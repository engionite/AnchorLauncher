name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:        # also runnable manually from the Actions tab

permissions:
  contents: write           # required to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained, single file)
        env:

          ANCHOR_CF_KEY: ${{ secrets.ANCHOR_CF_KEY }}
        run: >
          dotnet publish AnchorLauncher/AnchorLauncher.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish


      - name: Detect signing config
        id: sign
        shell: bash
        run: echo "enabled=${{ secrets.AZURE_CLIENT_ID != '' }}" >> "$GITHUB_OUTPUT"

      - name: Sign (Azure Trusted Signing)
        if: steps.sign.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        env:
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          endpoint: ${{ vars.TS_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TS_ACCOUNT }}
          certificate-profile-name: ${{ vars.TS_PROFILE }}
          files-folder: ${{ github.workspace }}\publish
          files-folder-filter: exe
      # ────────────────────────────────────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/AnchorLauncher.exe
          generate_release_notes: true
